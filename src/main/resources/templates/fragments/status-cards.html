<div id="status-container"
    th:fragment="statusCards"
    class="grid"
    th:attr="hx-get=@{/fragments/status-cards},hx-trigger='load, every ' + ${pollIntervalSeconds} + 's',hx-swap='outerHTML'">
    <article class="card" th:each="status : ${statuses}">
        <div class="row">
            <span class="indicator"
                  th:classappend="${status.state().name() == 'UP'} ? ' indicator-up' : (${status.state().name() == 'DOWN'} ? ' indicator-down' : ' indicator-wait')">
            </span>
            <h2 th:text="${status.name()}">Service Name</h2>
        </div>
        <p class="url" th:text="${status.url()}">https://example.com</p>
        <p><strong>State:</strong> <span th:text="${status.state()}">UP</span></p>
        <p><strong>HTTP:</strong> <span th:text="${status.statusCode()}">200</span></p>
        <p><strong>Response:</strong> <span th:text="${status.responseTimeMs()}">0</span> ms</p>
        <p><strong>Details:</strong> <span th:text="${status.details()}">HTTP 200</span></p>
        <p><strong>Checked:</strong> <span th:text="${#temporals.format(status.checkedAt(), 'yyyy-MM-dd HH:mm:ss')}">-</span></p>
    </article>
</div>
