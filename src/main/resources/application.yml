server:
  port: 8080

monitor:
  check-interval-ms: 60000
  connect-timeout: 5s
  read-timeout: 10s
  targets:
    - name: abc
      url: http://localhost:8000  
  alerts:
    enabled: true
    send-recovery: true
    from: noreply@your-domain.com
    recipients:
      - ops@your-domain.com

spring:
  mail:
    host: smtp.your-company-relay.com
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
